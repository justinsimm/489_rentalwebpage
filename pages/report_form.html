<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Report Form</title>
    <link rel="stylesheet" href="../css/report_form.css">
</head>
<body>
    <header class="navbar">
        <div class="container navContent">
            <a href="../index.html" class="logo">Rental Center</a>
            <nav>
                <ul class="navLinks">
                    <li><a href="../index.html">Home</a></li>
                    <li><a href="browse.html" class="active">Browse</a></li>
                    <li><a href="rentOutForm.html">List Item</a></li>
                    <li><a href="user_inbox.html">Inbox</a></li>
                    <li><a href="profile.html">Profile</a></li>
                    <li><a href="login.html">Login</a></li>
                    <li><a href="signup.html">Sign Up</a></li>
                </ul>
            </nav>
        </div>
    </header>
    
    <div class="background">
        <div class="border">
            <div class="container">
                <h1>Report Form</h1>
                <label for="reported-user">User Reported:</label>
                <input id="reported-user" type="text" placeholder="username or listing owner">
                <label for="report_reason">Rule Broken:</label>
                <select id="report_reason" name="report_reason">
                    <option value="inappropriate_item">Inappropriate Item</option>
                    <option value="inappropriate_username">Inappropriate Username</option>
                    <option value="user_scam">Scamming</option>
                    <option value="unrelated_details">Unrelated Details</option>
                </select>

                <label for="further_details">Details:</label>
                <textarea id="further_details" name="further_details" placeholder="Further Details (optional)"></textarea>
                <div class="mainButtons">
                    <a href="browse.html" class="btn btnPrimary">Submit Report</a>
                    <a href="item.html" class="btn btnSecondary">Back to Item</a>
                </div>
            </div>
        </div>
    </div>
</body>
</html>

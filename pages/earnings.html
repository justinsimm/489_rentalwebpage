<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Your Earnings</title>
    <link href="../css/earnings.css" rel="stylesheet">
</head>
<body>
    <header class="navbar">
        <div class="container navContent">
            <a href="../index.html" class="logo">Rental Center</a>
            <nav>
                <ul class="navLinks">
                    <li><a href="../index.html">Home</a></li>
                    <li><a href="browse.html">Browse</a></li>
                    <li><a href="rentOutForm.html">List Item</a></li>

    </header>

    <main>
        <div class="formContainer">
            <h1>Earnings Dashboard</h1>
            <p class="form-subtitle">Review your revenue and transaction history.</p>

            <form class="rentForm">
                <div class="formGroup">
                    <label>All-Time Earnings</label>
                    <input type="text" class="form-input" value="$1,250.00">
                </div>

                <div class="formGroup">
                    <label>Earnings (Last 30 Days)</label>
                    <input type="text" class="form-input" value="$450.00">
                </div>

                <div class="formGroup">
                    <label>Transaction History</label>
                    <textarea class="form-input">
                        Date: 3/6/2026 - Rented: Bouncy House - Revenue: $150.00
                        Date: 3/4/2026 - Rented: Chairs (x20) - Revenue: $50.00
                        Date: 2/23/2026 - Rented: Tent - Revenue: $250.00
                    </textarea>
                </div>

                <div class="mainButtons">
                    <a href="profile.html" class="btn btnSecondary">Back to Profile</a>
                </div>
            </form>
        </div>
    </main>
</body>
